<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevPulse — منصة المطورين</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <!-- الهيدر -->
    <header class="header">
      <h1>⚡ DevPulse</h1>
      <div class="auth-section">
        <input type="text" id="github-username" placeholder="اسم مستخدم GitHub" />
        <input type="password" id="github-token" placeholder="Personal Access Token" />
        <button id="connect-btn">🔗 ربط الحساب</button>
      </div>
    </header>

    <div class="main-layout">
      <!-- السايدبار: الأدوات المثبتة -->
      <aside class="sidebar" id="tools-sidebar">
        <h3>🧰 أدواتي</h3>
        <div id="installed-tools-list"></div>
        <button id="add-tool-btn">➕ إضافة أداة جديدة</button>
      </aside>

      <!-- المحتوى الرئيسي -->
      <main class="content">
        <!-- الفيد -->
        <section class="feed" id="main-feed">
          <h2>📰 آخر التحديثات</h2>
          <div id="feed-items">جاري التحميل من جيت هب...</div>
        </section>

        <!-- مشغل الأداة (مخفي افتراضيًا) -->
        <section class="tool-runner" id="tool-runner" hidden>
          <div class="tool-header">
            <h3 id="tool-title">اسم الأداة</h3>
            <button id="close-tool">✕</button>
          </div>
          <iframe id="tool-frame" sandbox="allow-scripts allow-forms allow-same-origin allow-downloads"></iframe>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
